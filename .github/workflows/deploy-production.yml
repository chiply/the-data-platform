name: Deploy Production Infrastructure

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

jobs:
  cluster-preview:
    name: "Pulumi Preview: cluster/production"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monorepo/infra/cluster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: production
          work-dir: monorepo/infra/cluster
          comment-on-summary: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

  cluster-up:
    name: "Pulumi Up: cluster/production"
    needs: cluster-preview
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: monorepo/infra/cluster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: production
          work-dir: monorepo/infra/cluster
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

  platform-preview:
    name: "Pulumi Preview: platform/production"
    needs: cluster-up
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monorepo/infra/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: production
          work-dir: monorepo/infra/platform
          comment-on-summary: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

  platform-up:
    name: "Pulumi Up: platform/production"
    needs: platform-preview
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: monorepo/infra/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: production
          work-dir: monorepo/infra/platform
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
