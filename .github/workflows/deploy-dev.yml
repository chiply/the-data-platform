name: Deploy Dev Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "monorepo/infra/**"

jobs:
  cluster-preview:
    name: "Pulumi Preview: cluster/dev"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monorepo/infra/cluster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: dev
          work-dir: monorepo/infra/cluster
          comment-on-summary: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

  cluster-up:
    name: "Pulumi Up: cluster/dev"
    needs: cluster-preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monorepo/infra/cluster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: monorepo/infra/cluster
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

  platform-preview:
    name: "Pulumi Preview: platform/dev"
    needs: cluster-up
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monorepo/infra/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: dev
          work-dir: monorepo/infra/platform
          comment-on-summary: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

  platform-up:
    name: "Pulumi Up: platform/dev"
    needs: platform-preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monorepo/infra/platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: monorepo/infra/platform
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
