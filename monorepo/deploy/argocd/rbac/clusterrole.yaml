# AC-4: ArgoCD ClusterRole scoped to managed namespaces only.
#
# In production, ArgoCD should NOT have cluster-admin. This ClusterRole grants
# only the permissions ArgoCD needs to manage resources in the 'tdp' namespace.
# The argocd-server and argocd-application-controller service accounts are bound
# to this role via the accompanying ClusterRoleBinding.
#
# If additional namespaces need to be managed, add rules with explicit
# resourceNames or use per-namespace Roles instead.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-managed-namespaces
  labels:
    app.kubernetes.io/part-of: argocd
rules:
  # Read access to namespaces so ArgoCD can verify destination namespaces exist
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["tdp"]

  # Full management of core resources in managed namespaces
  # (namespace-scoping is enforced by the RoleBinding, not here, but we
  # restrict resource types to match the AppProject whitelist)
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - services
      - serviceaccounts
      - persistentvolumeclaims
      - pods
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
