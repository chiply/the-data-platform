apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tdp-dev-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chiply/the-data-platform.git
    targetRevision: main
    path: monorepo/deploy/argocd/apps/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
