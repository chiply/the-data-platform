# Allow ArgoCD components to reach the Kubernetes API server.
#
# The API server typically listens on port 443 or 6443. We allow both.
# The destination is the kubernetes service in the default namespace.
#
# NOTE: Flannel (the default CNI in k3d) does NOT enforce NetworkPolicies.
# See default-deny.yaml for details on the local/production parity gap.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-kube-api
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution (required for all egress policies)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to the Kubernetes API server
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
