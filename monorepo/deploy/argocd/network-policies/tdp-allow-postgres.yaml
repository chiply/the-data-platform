# Allow application pods in tdp namespace to connect to CNPG Postgres pods
# on port 5432.
#
# This policy works within the existing default-deny-all framework defined in
# tdp-default-deny.yaml. Without it, application pods cannot reach the database.
#
# CNPG Postgres pods run in the tdp namespace alongside application workloads,
# so no cross-namespace policies are needed for app → DB traffic.
#
# NOTE: Flannel (the default CNI in k3d) does NOT enforce NetworkPolicies.
# This policy has no effect locally but is enforced in production with a
# CNI that supports NetworkPolicies (e.g., Calico, Cilium).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-postgres
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: the-data-platform
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: tdp-postgres
      ports:
        - protocol: TCP
          port: 5432
---
# Allow CNPG Postgres pods to receive connections from application pods in the
# tdp namespace on port 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress-from-apps
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: tdp-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: the-data-platform
      ports:
        - protocol: TCP
          port: 5432
---
# Allow CNPG Postgres pods egress to Linode Object Storage (HTTPS/443)
# for WAL archiving and base backups.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress-object-storage
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: tdp-postgres
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
---
# Allow CNPG Postgres pods (including initdb Jobs) egress to the Kubernetes
# API server. Required for CNPG bootstrap — the initdb pod calls the k8s API
# to read the Cluster CRD during initialization.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress-apiserver
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: tdp-postgres
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
# Allow CNPG operator pods in cnpg-system namespace to manage Postgres pods
# in the tdp namespace. The operator needs ingress access for health checks,
# status updates, and instance management.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress-from-operator
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: tdp-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8000
