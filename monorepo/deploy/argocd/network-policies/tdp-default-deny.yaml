# Default deny all ingress and egress traffic in the tdp application namespace.
#
# All application workloads must have explicit NetworkPolicy allow rules.
# This prevents lateral movement if a pod is compromised.
#
# NOTE: Flannel (the default CNI in k3d) does NOT enforce NetworkPolicies.
# This policy has no effect locally but is enforced in production with a
# CNI that supports NetworkPolicies (e.g., Calico, Cilium).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution for all pods in tdp namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow Traefik ingress to application pods in tdp namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8000
