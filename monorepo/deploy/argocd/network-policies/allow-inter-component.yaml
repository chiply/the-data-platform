# Allow all inter-component traffic within the argocd namespace.
#
# ArgoCD components (server, repo-server, application-controller, redis,
# dex, notifications-controller) need to communicate freely with each other.
#
# NOTE: Flannel (the default CNI in k3d) does NOT enforce NetworkPolicies.
# See default-deny.yaml for details on the local/production parity gap.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-inter-component
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: argocd
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: argocd
