# Allow ArgoCD repo-server egress on HTTPS (443) and SSH (22).
#
# WARNING: This policy allows egress to ANY destination on these ports,
# not just GitHub. Restricting to GitHub IP ranges (via ipBlock) is fragile
# as they change frequently. For tighter control, use a CNI with FQDN-based
# policies (e.g., Cilium).
#
# NOTE: Flannel (the default CNI in k3d) does NOT enforce NetworkPolicies.
# See default-deny.yaml for details on the local/production parity gap.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-github
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution (required for resolving github.com)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to GitHub
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow SSH to GitHub
    - to: []
      ports:
        - protocol: TCP
          port: 22
