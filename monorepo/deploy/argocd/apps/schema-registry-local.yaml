# Local ArgoCD Application for testing the GitOps workflow on k3d.
#
# Unlike the dev/production Applications, this one:
# - Uses values-local.yaml (k3d registry, traefik ingress)
# - Tracks the current working branch (update targetRevision as needed)
# - Has automated sync so changes appear immediately after git push
#
# Prerequisites:
#   1. Push your branch to GitHub
#   2. Build and push the image to the k3d registry:
#      docker build -t k3d-tdp-local-registry:5111/schema-registry:latest services/schema-registry
#      docker push k3d-tdp-local-registry:5111/schema-registry:latest
#   3. Run: tilt up -- --argocd
#      Or apply manually: kubectl apply -f deploy/argocd/apps/schema-registry-local.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: schema-registry-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tdp
  source:
    repoURL: https://github.com/charlieholland/the-data-platform.git
    # Set this to your working branch
    targetRevision: ralph/argocd-gitops-deployment
    path: monorepo/deploy/charts/schema-registry
    helm:
      valueFiles:
        - values.yaml
        - values-local.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tdp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
