apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: schema-registry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tdp
  source:
    repoURL: https://github.com/chiply/the-data-platform.git
    # Pinned to a release tag — updated by the promote-dev workflow.
    targetRevision: schema-registry-v0.1.11
    path: monorepo/deploy/charts/schema-registry
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      # image.tag is set here rather than in values-dev.yaml because
      # targetRevision pins the chart source to a release tag — ArgoCD
      # reads value files from that tag, not from main.
      parameters:
        - name: image.tag
          value: "0.1.11"
  destination:
    server: https://kubernetes.default.svc
    namespace: tdp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
