apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tdp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: The Data Platform application project
  sourceRepos:
    - https://github.com/charlieholland/the-data-platform.git
    - '*'  # Allow all repos for local development (file:// URLs)
  destinations:
    - namespace: tdp
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: ''
      kind: '*'
    - group: apps
      kind: '*'
    - group: networking.k8s.io
      kind: '*'
