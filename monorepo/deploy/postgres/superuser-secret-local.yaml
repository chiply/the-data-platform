# Superuser credentials for local CloudNativePG cluster.
# These match the app-secrets.ts local defaults.
apiVersion: v1
kind: Secret
metadata:
  name: tdp-postgres-superuser
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
    app.kubernetes.io/managed-by: tilt
type: kubernetes.io/basic-auth
stringData:
  username: tdp
  password: local-dev-password
