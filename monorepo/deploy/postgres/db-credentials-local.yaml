# Per-service database credentials secret for local development.
# Values match the CNPG Cluster initdb config and app-secrets.ts local defaults.
# In dev/production, Pulumi creates per-service secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: tdp-db-credentials
  namespace: tdp
  labels:
    app.kubernetes.io/part-of: the-data-platform
    app.kubernetes.io/managed-by: tilt
type: Opaque
stringData:
  host: tdp-postgres-rw.tdp.svc.cluster.local
  port: "5432"
  database: schema_registry
  username: tdp
  password: local-dev-password
