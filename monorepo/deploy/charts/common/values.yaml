# Default values for the common library chart.
# These values are not used directly by the library chart itself,
# but document the expected structure for consuming charts.

# -- Number of replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts: []
  #   - host: example.local
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # -- Ingress TLS configuration
  tls: []

# -- Container port
containerPort: 8080

# -- Resource requests and limits
resources: {}
#  limits:
#    cpu: 500m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 64Mi

securityContext:
  # -- Run container as non-root
  runAsNonRoot: true
  # -- Read-only root filesystem
  readOnlyRootFilesystem: true
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false

podSecurityContext: {}

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Liveness probe HTTP path
  path: /healthz
  # -- Liveness probe port
  port: http
  # -- Initial delay seconds
  initialDelaySeconds: 15
  # -- Period seconds
  periodSeconds: 20
  # -- Timeout seconds
  timeoutSeconds: 3
  # -- Failure threshold
  failureThreshold: 3
  # -- Success threshold
  successThreshold: 1

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Readiness probe HTTP path
  path: /readyz
  # -- Readiness probe port
  port: http
  # -- Initial delay seconds
  initialDelaySeconds: 5
  # -- Period seconds
  periodSeconds: 10
  # -- Timeout seconds
  timeoutSeconds: 3
  # -- Failure threshold
  failureThreshold: 3
  # -- Success threshold
  successThreshold: 1

startupProbe:
  # -- Enable startup probe
  enabled: false
  # -- Startup probe HTTP path
  path: /healthz
  # -- Startup probe port
  port: http
  # -- Initial delay seconds
  initialDelaySeconds: 0
  # -- Period seconds
  periodSeconds: 10
  # -- Timeout seconds
  timeoutSeconds: 3
  # -- Failure threshold
  failureThreshold: 30
  # -- Success threshold
  successThreshold: 1

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Service account annotations
  annotations: {}
  # -- Service account name (generated if not set)
  name: ""

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}
