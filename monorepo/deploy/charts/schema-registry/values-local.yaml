# Local development values for schema-registry (k3d cluster).

image:
  repository: k3d-tdp-local-registry:5111/schema-registry
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

# Security context for local dev — readOnlyRootFilesystem is disabled
# so Tilt live_update can sync files into the container.
securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

# Run as the app user (matches Dockerfile USER app)
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Database connection — uses per-service credentials consistent with dev/production.
# The schema_registry_app user owns the schema_registry database, avoiding
# PG 15+ public schema privilege issues with the generic tdp user.
env:
  - name: DB_HOST
    value: tdp-postgres-rw.tdp.svc.cluster.local
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: schema_registry
  - name: DB_USER
    value: schema_registry_app
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: tdp-schema-registry-db-credentials
        key: password
  - name: DB_SSLMODE
    value: "disable"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://alloy-otlp.monitoring.svc.cluster.local:4317"

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: schema-registry.localhost
      paths:
        - path: /
          pathType: Prefix
