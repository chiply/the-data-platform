# Local development values for schema-registry (k3d cluster).

image:
  repository: k3d-tdp-local-registry:5111/schema-registry
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

# Security context for local dev — readOnlyRootFilesystem is disabled
# so Tilt live_update can sync files into the container.
securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

# Run as the app user (matches Dockerfile USER app)
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Database connection — password sourced from the tdp-db-credentials secret
# (applied by Tilt from deploy/postgres/db-credentials-local.yaml) to match
# the secretKeyRef pattern used in dev/production values.
env:
  - name: DB_HOST
    value: tdp-postgres-rw.tdp.svc.cluster.local
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: schema_registry
  - name: DB_USER
    value: tdp
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: tdp-db-credentials
        key: password

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: schema-registry.localhost
      paths:
        - path: /
          pathType: Prefix
