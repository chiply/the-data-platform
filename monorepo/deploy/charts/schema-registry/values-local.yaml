# Local development values for schema-registry (k3d cluster).

image:
  repository: k3d-tdp-local-registry:5111/schema-registry
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

# Relax security context for local dev — Tilt live_update needs
# write access to the container filesystem to sync files.
securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

# Run as the app user (matches Dockerfile USER app)
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: schema-registry.localhost
      paths:
        - path: /
          pathType: Prefix
