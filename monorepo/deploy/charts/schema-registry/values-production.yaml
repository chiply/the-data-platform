# Production environment values for schema-registry.

image:
  repository: ghcr.io/chiply/the-data-platform/schema-registry
  pullPolicy: IfNotPresent
  # tag is set per-release, do not default to latest

imagePullSecrets:
  - name: ghcr-credentials

replicaCount: 2

migrations:
  enabled: true

env:
  - name: RUN_MIGRATIONS_ON_START
    value: "false"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: schema-registry.prod.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: schema-registry-tls
      hosts:
        - schema-registry.prod.example.com
