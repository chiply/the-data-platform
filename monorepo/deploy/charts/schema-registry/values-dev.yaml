# Dev environment values for schema-registry.

image:
  repository: ghcr.io/chiply/the-data-platform/schema-registry
  pullPolicy: IfNotPresent
  # image.tag is set via helm.parameters in the ArgoCD Application CRD,
  # not here, because targetRevision pins the chart source to a release tag.

imagePullSecrets:
  - name: ghcr-credentials

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

migrations:
  enabled: true

env:
  - name: RUN_MIGRATIONS_ON_START
    value: "false"
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: tdp-schema-registry-db-credentials
        key: host
  - name: DB_PORT
    valueFrom:
      secretKeyRef:
        name: tdp-schema-registry-db-credentials
        key: port
  - name: DB_NAME
    valueFrom:
      secretKeyRef:
        name: tdp-schema-registry-db-credentials
        key: database
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: tdp-schema-registry-db-credentials
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: tdp-schema-registry-db-credentials
        key: password
  - name: DB_SSLMODE
    value: "require"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://alloy-otlp.monitoring.svc.cluster.local:4317"

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}

ingress:
  enabled: true
  className: ""
  hosts:
    - host: schema-registry.dev.example.com
      paths:
        - path: /
          pathType: Prefix
