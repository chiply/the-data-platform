# Dev environment values for schema-registry.

image:
  repository: ghcr.io/chiply/the-data-platform/schema-registry
  pullPolicy: IfNotPresent
  # tag must be set to an explicit semver on each promotion.
  # Do NOT use "latest" — ArgoCD cannot detect image changes with mutable tags.
  tag: "0.1.5"

imagePullSecrets:
  - name: ghcr-credentials

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

migrations:
  enabled: true

env:
  - name: RUN_MIGRATIONS_ON_START
    value: "false"
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: tdp-db-credentials
        key: host
  - name: DB_PORT
    valueFrom:
      secretKeyRef:
        name: tdp-db-credentials
        key: port
  - name: DB_NAME
    valueFrom:
      secretKeyRef:
        name: tdp-db-credentials
        key: database
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: tdp-db-credentials
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: tdp-db-credentials
        key: password
  - name: DB_SSLMODE
    value: "verify-full"

ingress:
  enabled: true
  className: ""
  hosts:
    - host: schema-registry.dev.example.com
      paths:
        - path: /
          pathType: Prefix
