environment:
  - tdp/production
config:
  tdp-platform:clusterStackRef: chiply-org/tdp-cluster/production
  tdp-platform:resourceTier: standard
  tdp-platform:prometheusRetention: "30d"
  tdp-platform:prometheusScrapeInterval: "15s"
  tdp-platform:prometheusStorageSize: "50Gi"
  tdp-platform:tempoRetention: "168h"
  tdp-platform:tempoStorageSize: "20Gi"
  argocd:repoUrl: ${argocd.repoUrl}
  argocd:sshPrivateKey:
    fn::secret: ${argocd.sshPrivateKey}
  # Application secrets — values sourced from ESC environment tdp/production
  tdp-platform:dbHost: tdp-postgres-rw.tdp.svc.cluster.local
  tdp-platform:dbPort: "5432"
  tdp-platform:dbName: tdp
  tdp-platform:dbUsername: tdp_app
  # dbPassword, appApiKey, appSessionSecret are provided by ESC (fn::secret)
  # CloudNativePG configuration
  cnpg:storageSize: "50Gi"
  cnpg:backupRetentionDays: "30"
  cnpg:objectStoragePath: cnpg
  # Object storage credentials and database passwords are now provided
  # by the cluster stack (tdp-cluster/production) via stack references.
