environment:
  - tdp/dev
config:
  tdp-platform:clusterStackRef: chiply-org/tdp-cluster/dev
  tdp-platform:resourceTier: standard
  tdp-platform:prometheusRetention: "7d"
  tdp-platform:prometheusScrapeInterval: "15s"
  tdp-platform:prometheusStorageSize: "10Gi"
  argocd:repoUrl: ${argocd.repoUrl}
  argocd:sshPrivateKey:
    fn::secret: ${argocd.sshPrivateKey}
  # Application secrets — values sourced from ESC environment tdp/dev
  tdp-platform:dbHost: tdp-postgres-rw.tdp.svc.cluster.local
  tdp-platform:dbPort: "5432"
  tdp-platform:dbName: tdp
  tdp-platform:dbUsername: tdp_app
  # dbPassword, appApiKey, appSessionSecret are provided by ESC (fn::secret)
  # CloudNativePG configuration
  cnpg:storageSize: "10Gi"
  cnpg:backupRetentionDays: "7"
  cnpg:objectStorageEndpoint: https://us-east-1.linodeobjects.com
  cnpg:objectStorageBucket: tdp-dev-wal-archive
  cnpg:objectStoragePath: cnpg
  # cnpg:objectStorageAccessKey and cnpg:objectStorageSecretKey provided by ESC (fn::secret)
  # cnpg:schema-registryPassword and cnpg:feed-servicePassword provided by ESC (fn::secret)
